<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { 
      font-family: 'Inter', system-ui, sans-serif; 
      background: linear-gradient(180deg, {{BGCOLOR_TOP}} 0%, {{BGCOLOR_BOTTOM}} 100%);
      min-height: 100vh;
    }
    .video-wrapper {
      position: relative;
      padding-bottom: 56.25%;
      height: 0;
      overflow: hidden;
      border-radius: 12px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
    }
    .video-wrapper video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .cta-button {
      background: linear-gradient(135deg, {{ACCENT_COLOR}} 0%, {{ACCENT_DARK}} 100%);
      transition: all 0.3s ease;
    }
    .cta-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeIn 0.6s ease forwards; }
    .fade-in-delay { animation: fadeIn 0.6s ease 0.2s forwards; opacity: 0; }
  </style>
</head>
<body class="text-white">
  <div class="max-w-4xl mx-auto px-6 py-12">
    
    <!-- Headline Area -->
    <header class="text-center mb-10 fade-in">
      <h1 class="text-4xl md:text-5xl font-bold mb-4 tracking-tight" style="color: {{TITLE_COLOR}};">
        {{HEADLINE}}
      </h1>
      {{#SUBHEADLINE}}
      <p class="text-xl md:text-2xl font-light opacity-90 max-w-2xl mx-auto leading-relaxed">
        {{SUBHEADLINE}}
      </p>
      {{/SUBHEADLINE}}
    </header>

    <!-- Video Player -->
    <div class="video-wrapper mb-8 fade-in-delay">
      <video 
        autoplay 
        loop 
        muted 
        playsinline
        controls
        class="w-full"
      >
        <source src="video.mp4" type="video/mp4">
      </video>
    </div>

    <!-- Supporting Text -->
    {{#SUPPORTING_TEXT}}
    <div class="text-center mb-8 fade-in-delay">
      <p class="text-lg leading-relaxed opacity-80 max-w-2xl mx-auto">
        {{SUPPORTING_TEXT}}
      </p>
    </div>
    {{/SUPPORTING_TEXT}}

    <!-- CTA Area -->
    {{#CTA_URL}}
    <div class="text-center mb-10 fade-in-delay">
      <a 
        href="{{CTA_URL}}"
        class="cta-button inline-block text-white font-semibold py-4 px-10 rounded-full text-lg"
      >
        {{CTA_TEXT}}
      </a>
    </div>
    {{/CTA_URL}}

    <!-- Action Buttons -->
    <div class="flex flex-wrap justify-center gap-4 mb-12 fade-in-delay">
      <a 
        href="video.mp4" 
        download
        class="inline-flex items-center gap-2 bg-white/10 hover:bg-white/20 backdrop-blur border border-white/20 font-medium py-3 px-6 rounded-full transition"
      >
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
        </svg>
        Download Video
      </a>
      <button 
        onclick="copyLink()"
        class="inline-flex items-center gap-2 bg-white/10 hover:bg-white/20 backdrop-blur border border-white/20 font-medium py-3 px-6 rounded-full transition"
      >
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/>
        </svg>
        Copy Link
      </button>
    </div>

    <!-- Copy notification -->
    <div id="copyNotification" class="fixed bottom-6 left-1/2 transform -translate-x-1/2 bg-white text-gray-900 py-2 px-4 rounded-full opacity-0 transition-opacity duration-300 pointer-events-none shadow-lg">
      ✓ Link copied
    </div>

  </div>

  <!-- Footer -->
  <footer class="text-center py-8 border-t border-white/10">
    <a href="https://kingdomlife.site/five_fold" class="text-sm opacity-60 hover:opacity-100 transition">
      kingdomlife.site/five_fold
    </a>
  </footer>

  <script>
    function copyLink() {
      navigator.clipboard.writeText(window.location.href);
      const notification = document.getElementById('copyNotification');
      notification.style.opacity = '1';
      setTimeout(() => notification.style.opacity = '0', 2000);
    }
  </script>
</body>
</html>
