## Development Configuration

```yaml
model:
  provider: nvidia
  model: z-ai/glm5

gateway:
  port: 8080
  bind: 0.0.0.0

channels:
  - provider: telegram
    token: $TELEGRAM_BOT_TOKEN

logging:
  level: debug
  format: pretty
  output: console

session:
  persist: false

